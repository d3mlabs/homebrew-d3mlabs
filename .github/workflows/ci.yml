name: Homebrew tap CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-dev-formula:
    runs-on: macos-latest

    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Set up Homebrew
        run: |
          brew update

      - name: Register local tap
        run: |
          brew tap d3mlabs/d3mlabs "$GITHUB_WORKSPACE"

      - name: Audit dev formula
        run: |
          brew audit --strict d3mlabs/d3mlabs/dev

      - name: Debug - environment and plain gem install
        run: |
          set -x
          brew --version
          export PATH="$(brew --prefix ruby)/bin:$PATH"
          ruby -v
          gem -v
          dest="$(mktemp -d)"
          gem install cli-ui -v 2.7.0 --no-document --ignore-dependencies --install-dir "$dest" || echo "cli-ui FAILED rc=$?"
          gem install sorbet-runtime -v 0.6.13295 --no-document --ignore-dependencies --install-dir "$dest" || echo "sorbet-runtime FAILED rc=$?"
          ls -la "$dest/gems" || true

      - name: Install dev from tap
        run: |
          brew install --verbose d3mlabs/d3mlabs/dev

      - name: Dump Homebrew build logs on failure
        if: failure()
        run: |
          echo "=== ~/Library/Logs/Homebrew/dev ==="
          cat ~/Library/Logs/Homebrew/dev/* 2>/dev/null || echo "(no logs)"
          echo "=== brew gist-logs (last build) ==="
          ls -la ~/Library/Logs/Homebrew/ 2>/dev/null || true

      - name: Run dev formula tests
        run: |
          brew test d3mlabs/d3mlabs/dev
