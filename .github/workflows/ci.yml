name: Homebrew tap CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-dev-formula:
    runs-on: macos-latest

    env:
      # Homebrew 6.0 requires third-party taps to be trusted before their
      # formulae can be built; an untrusted tap fails the build immediately
      # with no logs. This is our own tap, so allow it in CI.
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"

    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Set up Homebrew
        run: brew update

      - name: Register local tap
        run: brew tap d3mlabs/d3mlabs "$GITHUB_WORKSPACE"

      - name: Audit dev formula
        run: brew audit --strict d3mlabs/d3mlabs/dev

      - name: Install dev from tap
        run: brew install d3mlabs/d3mlabs/dev

      - name: Run dev formula tests
        run: brew test d3mlabs/d3mlabs/dev
